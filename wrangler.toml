name = "daily-dose-devotions-mailer"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Cloudflare cron uses UTC, so this runs hourly and the Worker checks
# Europe/Dublin local time internally. That handles daylight saving time.
[triggers]
crons = ["0 * * * *"]

[[kv_namespaces]]
binding = "SENT_DEVOTIONS"
id = "replace-with-your-kv-namespace-id"

[vars]
APP_TIME_ZONE = "Europe/Dublin"
BREVO_LIST_ID = "replace-with-your-brevo-list-id"
BREVO_SENDER_EMAIL = "hello@yourdomain.com"
BREVO_SENDER_NAME = "Daily Dose Devotions"
GITHUB_OWNER = "dailydosedevotions-oss"
GITHUB_REPO = "dailydosewebsite"
GITHUB_BRANCH = "main"
GITHUB_DEVOTION_PATH_TEMPLATE = "devotions/{date}.json"
SITE_URL = "https://yourdomain.com"

# Add secrets with:
# wrangler secret put BREVO_API_KEY
# wrangler secret put GITHUB_TOKEN
